<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>kiki的未来存钱罐</title>
<style>
  :root {
    --bg: #F5F5F0;
    --card-bg: #FFFFFF;
    --text: #2D2D2D;
    --text-light: #888888;
    --border: #E8E8E3;
    --green: #4CAF50;
    --red: #EF5350;
    --orange: #FF9800;
    --blue: #42A5F5;
    --purple: #9C27B0;
    --shadow: 0 1px 6px rgba(0,0,0,0.06);
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; overflow:hidden; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text);
  }

  .app {
    display: flex;
    height: 100vh;
    width: 100%;
  }

  /* ===== LEFT PANEL (Piggy) ===== */
  .left-panel {
    width: 360px;
    min-width: 320px;
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    background: var(--bg);
    border-right: 1px solid var(--border);
    overflow: hidden;
  }

  .left-title {
    font-size: 28px;
    font-weight: 700;
    color: var(--text);
    text-align: center;
    align-self: center;
    margin-bottom: 4px;
  }
  .left-subtitle {
    font-size: 12px;
    color: var(--text-light);
    text-align: center;
    align-self: center;
    margin-bottom: 20px;
    line-height: 1.6;
  }

  .stat-box {
    width: 100%;
    background: var(--card-bg);
    border-radius: 12px;
    padding: 12px 16px;
    margin-bottom: 10px;
    box-shadow: var(--shadow);
  }
  .stat-box-title {
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .stat-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 4px 0;
    font-size: 13px;
    border-bottom: 1px solid #F0F0F0;
  }
  .stat-row:last-child { border-bottom: none; }
  .stat-row .sr-label { color: var(--text-light); }
  .stat-row .sr-val { font-weight: 600; }
  .stat-row .sr-val.green { color: var(--green); }
  .stat-row .sr-val.red { color: var(--red); }
  .stat-row .sr-val.brown { color: #6D4C41; }

  .goal-section {
    margin-top: 10px;
  }
  .goal-section .gs-input-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }
  .goal-section .gs-input-row label {
    font-size: 12px;
    color: var(--text-light);
    white-space: nowrap;
  }
  .goal-section .gs-input-row input {
    flex: 1;
    padding: 6px 10px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 13px;
    outline: none;
    background: #fff;
    transition: border-color .2s;
  }
  .goal-section .gs-input-row input:focus { border-color: #6D4C41; }
  .goal-section .gs-input-row button {
    padding: 6px 12px;
    background: #6D4C41;
    color: #fff;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 12px;
    transition: opacity .2s;
  }
  .goal-section .gs-input-row button:hover { opacity: 0.85; }
  .goal-bar-bg {
    width: 100%;
    height: 10px;
    background: #F0F0F0;
    border-radius: 5px;
    overflow: hidden;
  }
  .goal-bar-fill {
    height: 100%;
    background: #6D4C41;
    border-radius: 5px;
    transition: width .5s ease;
  }
  .goal-text {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text-light);
    margin-top: 5px;
  }

  /* Piggy bank */
  .piggy-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    width: 100%;
    position: relative;
    padding-top: 0;
    margin-top: -30px;
  }

  .piggy-wrap {
    position: relative;
    cursor: pointer;
  }

  .piggy-tooltip {
    position: absolute;
    top: -8px;
    left: 50%;
    transform: translateX(-50%) translateY(-100%);
    background: rgba(45,45,45,0.92);
    color: #fff;
    border-radius: 12px;
    padding: 14px 18px;
    min-width: 220px;
    opacity: 0;
    pointer-events: none;
    transition: opacity .3s, transform .3s;
    font-size: 12px;
    z-index: 10;
  }
  .piggy-tooltip::after {
    content: '';
    position: absolute;
    bottom: -8px;
    left: 50%;
    transform: translateX(-50%);
    border: 8px solid transparent;
    border-top-color: rgba(45,45,45,0.92);
  }
  .piggy-wrap:hover .piggy-tooltip {
    opacity: 1;
    transform: translateX(-50%) translateY(-100%) translateY(-6px);
  }
  .tt-row {
    display: flex;
    justify-content: space-between;
    padding: 3px 0;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .tt-row:last-child { border-bottom: none; }
  .tt-label { color: #B0B0B0; }
  .tt-val { font-weight: 600; }
  .tt-val.pink { color: #F48FB1; }
  .tt-val.orange { color: #FFCC80; }
  .tt-val.green { color: #81C784; }
  .tt-val.red { color: #EF9A9A; }
  .tt-val.blue { color: #90CAF9; }

  .piggy-tip {
    margin-top: 12px;
    font-size: 11px;
    color: var(--text-light);
    text-align: center;
  }

  .piggy-img {
    width: 320px;
    height: auto;
    border-radius: 16px;
    display: block;
  }

  /* ===== RIGHT PANEL (Form) ===== */
  .right-panel {
    flex: 1;
    min-width: 0;
    padding: 24px 28px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    overflow: hidden;
  }

  .quick-entry {
    background: var(--card-bg);
    border-radius: 14px;
    padding: 16px 18px;
    box-shadow: var(--shadow);
    flex-shrink: 0;
  }
  .qe-title {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .qe-desc {
    font-size: 12px;
    color: var(--text-light);
    margin-bottom: 12px;
  }
  .qe-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }
  .qe-tab {
    padding: 6px 16px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: #fff;
    cursor: pointer;
    font-size: 13px;
    transition: all .2s;
  }
  .qe-tab.active {
    background: #6D4C41;
    color: #fff;
    border-color: #6D4C41;
  }
  .qe-tab:hover:not(.active) { background: #F5F5F5; }

  .qe-form {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr 60px 80px;
    gap: 8px;
    align-items: end;
  }
  .qe-field {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .qe-field label {
    font-size: 11px;
    color: var(--text-light);
  }
  .qe-field input, .qe-field select {
    padding: 8px 10px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 13px;
    outline: none;
    background: #fff;
    transition: border-color .2s;
  }
  .qe-field input:focus, .qe-field select:focus { border-color: var(--text); }
  .qe-add-btn {
    padding: 8px 0;
    background: #6D4C41;
    color: #fff;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    transition: opacity .2s;
  }
  .qe-add-btn:hover { opacity: 0.85; }

  .qe-note {
    font-size: 11px;
    color: var(--text-light);
    margin-top: 8px;
  }

  /* Lists area */
  .lists-area {
    flex: 1;
    display: flex;
    gap: 16px;
    min-height: 0;
    overflow: hidden;
  }

  .list-card {
    flex: 1;
    background: var(--card-bg);
    border-radius: 14px;
    padding: 14px 16px;
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    min-height: 0;
    overflow: hidden;
  }
  .list-card-title {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }
  .list-card-sub {
    font-size: 11px;
    color: var(--text-light);
    margin-bottom: 10px;
    flex-shrink: 0;
  }

  .list-scroll {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding-right: 4px;
  }
  .list-scroll::-webkit-scrollbar { width: 4px; }
  .list-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .list-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    margin-bottom: 8px;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    background: #FAFAF8;
    font-size: 13px;
    transition: border-color .2s, box-shadow .2s;
  }
  .list-item:hover {
    border-color: #D0D0C8;
    box-shadow: 0 1px 4px rgba(0,0,0,0.05);
  }
  .list-item .li-icon {
    width: 28px; height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    flex-shrink: 0;
  }
  .list-item .li-icon.family { background: #FCE4EC; }
  .list-item .li-icon.self { background: #FFF3E0; }
  .list-item .li-icon.expense { background: #FFEBEE; }
  .list-item .li-checkbox {
    width: 18px; height: 18px;
    cursor: pointer;
    flex-shrink: 0;
    accent-color: var(--green);
  }
  .list-item .li-info { flex: 1; min-width: 0; }
  .list-item .li-name { font-weight: 500; margin-bottom: 2px; }
  .list-item .li-meta { font-size: 11px; color: var(--text-light); }
  .list-item .li-amount { font-weight: 600; flex-shrink: 0; }
  .list-item .li-amount.green { color: var(--green); }
  .list-item .li-amount.red { color: var(--red); }
  .list-item .li-actions {
    display: flex;
    gap: 4px;
    flex-shrink: 0;
    opacity: 0;
    transition: opacity .2s;
  }
  .list-item:hover .li-actions { opacity: 1; }
  .list-item .li-actions button {
    background: none; border: none;
    cursor: pointer; font-size: 12px;
    padding: 2px 6px; border-radius: 4px;
    color: var(--text-light);
  }
  .list-item .li-actions button:hover { background: #F5F5F5; color: var(--red); }

  .empty-state {
    text-align: center;
    padding: 30px 0;
    color: var(--text-light);
    font-size: 12px;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--text);
    color: #fff;
    padding: 10px 22px;
    border-radius: 20px;
    font-size: 13px;
    opacity: 0;
    transition: all .3s;
    z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Responsive */
  @media (max-width: 900px) {
    .app { flex-direction: column; height: auto; overflow: auto; }
    .left-panel { width: 100%; border-right: none; border-bottom: 1px solid var(--border); }
    .lists-area { flex-direction: column; }
  }
</style>
</head>
<body>
<div class="app">

  <!-- ===== LEFT: Piggy Bank ===== -->
  <div class="left-panel">
    <div class="left-title">kiki的未来存钱罐</div>
    <div class="left-subtitle">
      一只帮你记账的猫咪计算器，<br>
      悬停时会显示具体数额。
    </div>

    <div class="stat-box">
      <div class="stat-box-title">📊 储蓄概况</div>
      <div class="stat-row"><span class="sr-label">💰 收入合计</span><span class="sr-val green" id="sbIncome">¥0</span></div>
      <div class="stat-row"><span class="sr-label">💸 支出合计</span><span class="sr-val red" id="sbExpense">¥0</span></div>
      <div class="stat-row"><span class="sr-label">✨ 本月结余</span><span class="sr-val brown" id="sbBalance">¥0</span></div>
      <div class="stat-row"><span class="sr-label">🐷 累计储蓄</span><span class="sr-val brown" id="sbTotal">¥0</span></div>

      <div class="goal-section">
        <div class="gs-input-row">
          <label>储蓄目标</label>
          <input type="number" id="goalInput" placeholder="设置目标金额" min="0">
          <button onclick="setGoal()">设定</button>
        </div>
        <div class="goal-bar-bg"><div class="goal-bar-fill" id="goalBarFill" style="width:0%"></div></div>
        <div class="goal-text">
          <span id="goalPct">0%</span>
          <span id="goalTarget">目标 ¥0</span>
        </div>
      </div>
    </div>

    <div class="piggy-area">
      <div class="piggy-wrap" id="piggyWrap">
        <!-- Tooltip -->
        <div class="piggy-tooltip" id="piggyTooltip">
          <div class="tt-row"><span class="tt-label">家里支持</span><span class="tt-val pink" id="ttFamily">¥0</span></div>
          <div class="tt-row"><span class="tt-label">自己攒的</span><span class="tt-val orange" id="ttSelf">¥0</span></div>
          <div class="tt-row"><span class="tt-label">收入合计</span><span class="tt-val green" id="ttIncome">¥0</span></div>
          <div class="tt-row"><span class="tt-label">支出合计</span><span class="tt-val red" id="ttExpense">¥0</span></div>
          <div class="tt-row"><span class="tt-label">本月结余</span><span class="tt-val blue" id="ttBalance">¥0</span></div>
        </div>

        <!-- Cat Calculator Image -->
        <img src="image1.png" alt="猫咪计算器" class="piggy-img" id="piggyImg">
      </div>
      <div class="piggy-tip">🖱️ 把鼠标放在猫咪上，可以查看储蓄详情。</div>
    </div>
  </div>

  <!-- ===== RIGHT: Form & Lists ===== -->
  <div class="right-panel">

    <!-- Quick Entry -->
    <div class="quick-entry">
      <div class="qe-title">📝 快速录入</div>
      <div class="qe-desc">默认只展示记录，点编辑才会出现可修改内容。</div>
      <div class="qe-tabs">
        <button class="qe-tab active" onclick="switchTab('income')" id="tabIncome">💰 收入</button>
        <button class="qe-tab" onclick="switchTab('expense')" id="tabExpense">💸 支出</button>
      </div>
      <div class="qe-form" id="incomeForm">
        <div class="qe-field">
          <label>来源</label>
          <select id="incomeSource">
            <option value="family">🏠 家里支持</option>
            <option value="self">👤 自己</option>
          </select>
        </div>
        <div class="qe-field">
          <label>项目</label>
          <input type="text" id="incomeItem" placeholder="比如 BA / 家里支持 / 卖电脑">
        </div>
        <div class="qe-field">
          <label>金额</label>
          <input type="number" id="incomeAmount" placeholder="0" min="0">
        </div>
        <div class="qe-field">
          <label>备注</label>
          <input type="text" id="incomeNote" placeholder="选填">
        </div>
        <button class="qe-add-btn" onclick="addIncome()">加入</button>
      </div>
      <div class="qe-form" id="expenseForm" style="display:none">
        <div class="qe-field">
          <label>分类</label>
          <select id="expenseCat">
            <option value="🍔 餐饮">🍔 餐饮</option>
            <option value="🚌 交通">🚌 交通</option>
            <option value="🛒 购物">🛒 购物</option>
            <option value="🎮 娱乐">🎮 娱乐</option>
            <option value="📚 学习">📚 学习</option>
            <option value="💊 医疗">💊 医疗</option>
            <option value="🏠 住房">🏠 住房</option>
            <option value="📱 通讯">📱 通讯</option>
            <option value="👕 服饰">👕 服饰</option>
            <option value="🎁 礼物">🎁 礼物</option>
            <option value="✈️ 旅行">✈️ 旅行</option>
            <option value="📦 其他">📦 其他</option>
          </select>
        </div>
        <div class="qe-field">
          <label>项目</label>
          <input type="text" id="expenseItem" placeholder="比如 BA 学费">
        </div>
        <div class="qe-field">
          <label>金额</label>
          <input type="number" id="expenseAmount" placeholder="0" min="0">
        </div>
        <div class="qe-field">
          <label>备注</label>
          <input type="text" id="expenseNote" placeholder="选填">
        </div>
        <div class="qe-field">
          <label>状态</label>
          <select id="expensePaid">
            <option value="false">⏳</option>
            <option value="true">✅</option>
          </select>
        </div>
        <button class="qe-add-btn" onclick="addExpense()">加入</button>
      </div>
      <div class="qe-note">会加入对应列表。</div>
    </div>

    <!-- Lists -->
    <div class="lists-area">
      <!-- Income List -->
      <div class="list-card">
        <div class="list-card-title">💰 收入</div>
        <div class="list-card-sub">🏠 家里支持，👤 自己。</div>
        <div class="list-scroll" id="incomeList"></div>
      </div>
      <!-- Expense List -->
      <div class="list-card">
        <div class="list-card-title">💸 支出</div>
        <div class="list-card-sub">⏳ 待支付，✅ 已支付。</div>
        <div class="list-scroll" id="expenseList"></div>
      </div>
    </div>

  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  let allData = {};
  let currentMonthKey = '';
  let currentTab = 'income';

  function init() {
    loadData();
    const now = new Date();
    setMonth(now.getFullYear(), now.getMonth() + 1);
  }

  function getMonthKey(y, m) { return y + '-' + String(m).padStart(2, '0'); }

  function setMonth(y, m) {
    currentMonthKey = getMonthKey(y, m);
    if (!allData[currentMonthKey]) {
      allData[currentMonthKey] = { income: [], expense: [] };
    }
    renderAll();
  }

  function renderAll() {
    renderIncomeList();
    renderExpenseList();
    updatePiggy();
  }

  // ===== Tab Switch =====
  function switchTab(tab) {
    currentTab = tab;
    document.getElementById('tabIncome').classList.toggle('active', tab === 'income');
    document.getElementById('tabExpense').classList.toggle('active', tab === 'expense');
    document.getElementById('incomeForm').style.display = tab === 'income' ? 'grid' : 'none';
    document.getElementById('expenseForm').style.display = tab === 'expense' ? 'grid' : 'none';
  }

  // ===== Add Income =====
  function addIncome() {
    const source = document.getElementById('incomeSource').value;
    const item = document.getElementById('incomeItem').value.trim();
    const amount = parseFloat(document.getElementById('incomeAmount').value);
    const note = document.getElementById('incomeNote').value.trim();
    if (!item) { showToast('请输入项目名称'); return; }
    if (!amount || amount <= 0) { showToast('请输入有效金额'); return; }

    const d = allData[currentMonthKey];
    d.income.push({ source, item, amount, note, date: new Date().toISOString().slice(0, 10) });
    document.getElementById('incomeItem').value = '';
    document.getElementById('incomeAmount').value = '';
    document.getElementById('incomeNote').value = '';
    renderAll();
    autoSave();
    showToast('收入已添加 ✅');
  }

  // ===== Add Expense =====
  function addExpense() {
    const cat = document.getElementById('expenseCat').value;
    const item = document.getElementById('expenseItem').value.trim();
    const amount = parseFloat(document.getElementById('expenseAmount').value);
    const note = document.getElementById('expenseNote').value.trim();
    const paid = document.getElementById('expensePaid').value === 'true';
    if (!item) { showToast('请输入项目名称'); return; }
    if (!amount || amount <= 0) { showToast('请输入有效金额'); return; }

    const d = allData[currentMonthKey];
    d.expense.push({ cat, item, amount, note, paid, date: new Date().toISOString().slice(0, 10) });
    document.getElementById('expenseItem').value = '';
    document.getElementById('expenseAmount').value = '';
    document.getElementById('expenseNote').value = '';
    document.getElementById('expensePaid').value = 'false';
    renderAll();
    autoSave();
    showToast('支出已添加 ✅');
  }

  // ===== Delete =====
  function delIncome(idx) {
    allData[currentMonthKey].income.splice(idx, 1);
    renderAll();
    autoSave();
    showToast('已删除');
  }
  function delExpense(idx) {
    allData[currentMonthKey].expense.splice(idx, 1);
    renderAll();
    autoSave();
    showToast('已删除');
  }

  // ===== Toggle Paid =====
  function togglePaid(idx) {
    const exp = allData[currentMonthKey].expense[idx];
    exp.paid = !exp.paid;
    renderAll();
    autoSave();
    showToast(exp.paid ? '已标记为已支付 ✅' : '已标记为待支付 ⏳');
  }

  // ===== Render Lists =====
  function renderIncomeList() {
    const list = document.getElementById('incomeList');
    const d = allData[currentMonthKey];
    if (!d.income || d.income.length === 0) {
      list.innerHTML = '<div class="empty-state">暂无收入记录</div>';
      return;
    }
    list.innerHTML = d.income.map((inc, idx) => {
      const isFamily = inc.source === 'family';
      const icon = isFamily ? '🏠' : '👤';
      const sourceLabel = isFamily ? '家里支持' : '自己';
      return `
        <div class="list-item">
          <div class="li-icon ${isFamily ? 'family' : 'self'}">${icon}</div>
          <div class="li-info">
            <div class="li-name">${inc.item}</div>
            <div class="li-meta">${sourceLabel} · ${inc.date}${inc.note ? ' · ' + inc.note : ''}</div>
          </div>
          <div class="li-amount green">+¥${inc.amount.toFixed(2)}</div>
          <div class="li-actions">
            <button onclick="delIncome(${idx})">删除</button>
          </div>
        </div>
      `;
    }).join('');
  }

  function renderExpenseList() {
    const list = document.getElementById('expenseList');
    const d = allData[currentMonthKey];
    if (!d.expense || d.expense.length === 0) {
      list.innerHTML = '<div class="empty-state">暂无支出记录</div>';
      return;
    }
    list.innerHTML = d.expense.map((exp, idx) => {
      const parts = exp.cat.split(' ');
      const icon = parts[0] || '📦';
      return `
        <div class="list-item">
          <input type="checkbox" class="li-checkbox" ${exp.paid ? 'checked' : ''} onchange="togglePaid(${idx})" title="勾选切换已支付/待支付">
          <div class="li-icon expense">${icon}</div>
          <div class="li-info">
            <div class="li-name">${exp.item}</div>
            <div class="li-meta">${exp.paid ? '✅ 已支付' : '⏳ 待支付'} · ${exp.date}${exp.note ? ' · ' + exp.note : ''}</div>
          </div>
          <div class="li-amount red">-¥${exp.amount.toFixed(2)}</div>
          <div class="li-actions">
            <button onclick="delExpense(${idx})">删除</button>
          </div>
        </div>
      `;
    }).join('');
  }

  // ===== Pixel Art Piggy =====
  const PX = 12; // pixel block size
  const PIGGY_MAP = [
    "....EE........EE....",
    "..EEEE........EEEE..",
    "..EEEE........EEEE..",
    "...EE..........EE...",
    "......CCCCC.........",
    ".....B......B.......",
    "..OOOOOOOOOOOOOOOO..",
    ".OPPPPPPPPPPPPPPPPO.",
    "OPPPPPPPPPPPPPPPPPPO",
    "OPPPPPPPNNNNPPPPPPPT",
    "OPPPPPPPNnnNPPPPPPPT",
    "OPPPPPPPNNNNPPPPPPPT",
    "OPPPPPPPPPPPPPPPPPPO",
    "OPPPPPPPPPPPPPPPPPPO",
    ".OPPPPPPPPPPPPPPPPO.",
    "..OOOOOOOOOOOOOOOO..",
    "....LL........LL....",
    "....LL........LL....",
  ];
  const PIGGY_COLORS = {
    'O': '#AD1457', 'E': '#F48FB1', 'C': '#555555',
    'B': '#333333', 'N': '#FCE4EC', 'n': '#AD1457',
    'L': '#F48FB1', 'T': '#F48FB1',
  };
  const COLOR_FAMILY = '#F8BBD0'; // pink
  const COLOR_SELF    = '#FFCC80'; // orange

  function drawPixelPiggy(familyTotal, selfTotal) {
    const canvas = document.getElementById('piggyCanvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const incomeTotal = familyTotal + selfTotal;
    const familyRatio = incomeTotal > 0 ? familyTotal / incomeTotal : 1;

    // Body rows 7-14 → calculate split Y
    const bodyTopRow = 7, bodyBotRow = 14;
    const bodyH = (bodyBotRow - bodyTopRow + 1) * PX;
    const splitY = bodyTopRow * PX + bodyH * familyRatio;

    for (let r = 0; r < PIGGY_MAP.length; r++) {
      const row = PIGGY_MAP[r];
      for (let c = 0; c < row.length; c++) {
        const ch = row[c];
        if (ch === '.') continue;
        let color;
        if (ch === 'P') {
          if (incomeTotal === 0) {
            color = COLOR_FAMILY;
          } else {
            color = (r * PX < splitY) ? COLOR_FAMILY : COLOR_SELF;
          }
        } else {
          color = PIGGY_COLORS[ch] || COLOR_FAMILY;
        }
        ctx.fillStyle = color;
        ctx.fillRect(c * PX, r * PX, PX, PX);
      }
    }
  }

  // ===== Piggy Update =====
  function updatePiggy() {
    const d = allData[currentMonthKey];
    const familyTotal = d.income.filter(i => i.source === 'family').reduce((s, i) => s + i.amount, 0);
    const selfTotal = d.income.filter(i => i.source === 'self').reduce((s, i) => s + i.amount, 0);
    const incomeTotal = familyTotal + selfTotal;
    const expenseTotal = d.expense.reduce((s, e) => s + e.amount, 0);
    const balance = incomeTotal - expenseTotal;

    // Cumulative savings across all months
    let totalSavings = 0;
    for (const key in allData) {
      const m = allData[key];
      const inc = (m.income||[]).reduce((s,i)=>s+i.amount,0);
      const exp = (m.expense||[]).reduce((s,e)=>s+e.amount,0);
      totalSavings += inc - exp;
    }

    // Tooltip values
    document.getElementById('ttFamily').textContent = '¥' + familyTotal.toFixed(2);
    document.getElementById('ttSelf').textContent = '¥' + selfTotal.toFixed(2);
    document.getElementById('ttIncome').textContent = '¥' + incomeTotal.toFixed(2);
    document.getElementById('ttExpense').textContent = '¥' + expenseTotal.toFixed(2);
    document.getElementById('ttBalance').textContent = '¥' + balance.toFixed(2);

    // Stat box values
    document.getElementById('sbIncome').textContent = '¥' + incomeTotal.toFixed(2);
    document.getElementById('sbExpense').textContent = '¥' + expenseTotal.toFixed(2);
    document.getElementById('sbBalance').textContent = '¥' + balance.toFixed(2);
    document.getElementById('sbTotal').textContent = '¥' + totalSavings.toFixed(2);

    // Goal progress
    const goal = parseFloat(localStorage.getItem('piggy_goal')) || 0;
    const pct = goal > 0 ? Math.min(100, (totalSavings / goal) * 100) : 0;
    document.getElementById('goalBarFill').style.width = pct.toFixed(1) + '%';
    document.getElementById('goalPct').textContent = pct.toFixed(1) + '%';
    document.getElementById('goalTarget').textContent = '目标 ¥' + goal.toFixed(2);
    document.getElementById('goalInput').value = goal || '';

    // Draw pixel piggy with layered colors
    drawPixelPiggy(familyTotal, selfTotal);
  }

  // ===== Set Goal =====
  function setGoal() {
    const val = parseFloat(document.getElementById('goalInput').value);
    if (!val || val <= 0) { showToast('请输入有效目标金额'); return; }
    localStorage.setItem('piggy_goal', val);
    updatePiggy();
    showToast('储蓄目标已设定 🎯');
  }

  // ===== Auto Save =====
  function autoSave() {
    localStorage.setItem('piggy_data', JSON.stringify(allData));
  }

  // ===== Persistence =====
  function saveData() {
    localStorage.setItem('piggy_data', JSON.stringify(allData));
    showToast('✅ 数据已保存');
  }

  function loadData() {
    const raw = localStorage.getItem('piggy_data');
    if (raw) { try { allData = JSON.parse(raw); } catch(e) { allData = {}; } }
  }

  // Auto-save on page unload
  window.addEventListener('beforeunload', () => {
    localStorage.setItem('piggy_data', JSON.stringify(allData));
  });

  // Toast
  let toastTimer = null;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
  }

  init();
</script>
</body>
</html>
